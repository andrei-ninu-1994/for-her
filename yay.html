<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>YAY ❤️</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #111, #000);
    color: white;
    font-family: Arial;
    text-align: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.container {
    max-width: 700px;
}

img {
    width: 220px;
    border-radius: 20px;
    margin-bottom: 15px;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

h1 {
    color: #00ffcc;
    font-size: 50px;
    margin-bottom: 10px;
}

h2 {
    font-size: 22px;
    margin-bottom: 20px;
}

button {
    display: block;
    width: 260px;
    margin: 10px auto;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.opt1 { background: #ff4d6d; color: white; }
.opt2 { background: #00cc88; color: white; }
.opt3 { background: #ffd166; color: black; }
.opt4 { background: #6c63ff; color: white; }

#result {
    margin-top: 15px;
    font-size: 18px;
    opacity: 0;
    transition: 0.5s;
}

/* confetti */
.confetti {
    position: absolute;
    top: -20px;
    animation: fall 2s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(120vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="F.jpg" alt="poza">

    <h1>YAY! 🎉</h1>

    <h2>Ce ai vrea să-ți gătesc Purrito? 🍳</h2>

    <button class="opt1" onclick="choose('Ovăz proteic 🥣')">Ovăz proteic</button>
    <button class="opt2" onclick="choose('Clătite proteice 🥞')">Clătite proteice</button>
    <button class="opt3" onclick="choose('Pui cu legume 🍗')">Pui cu legume</button>
    <button class="opt4" onclick="choose('Paste cu vită 🍝')">Paste cu vită</button>

    <div id="result"></div>
</div>

<script>

function choose(text) {
    const result = document.getElementById("result");
    result.style.opacity = 1;

    // confetti
    createConfetti();

    result.innerHTML = "Ai ales: <b>" + text + "</b> 😏<br>Bună alegere! ❤️";

    // deschide email după 1.2 sec
    setTimeout(() => {
        window.location.href =
        "mailto:andrei.ninu.1994@gmail.com" +
        "?subject=Am ales mâncarea 🍽️" +
        "&body=Hei ❤️%0D%0A%0D%0AAm ales: " + text + "%0D%0AAbia aștept 😊";
    }, 1200);
}

function createConfetti() {
    for (let i = 0; i < 30; i++) {
        const c = document.createElement("div");
        c.classList.add("confetti");
        c.innerHTML = "🎉";

        c.style.left = Math.random() * 100 + "vw";
        c.style.fontSize = (Math.random() * 20 + 15) + "px";
        c.style.animationDuration = (Math.random() * 2 + 1.5) + "s";

        document.body.appendChild(c);

        setTimeout(() => c.remove(), 2500);
    }
}

</script>

</body>
</html>
