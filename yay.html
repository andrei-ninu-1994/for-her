<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>YAY ❤️</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #111, #000);
    color: white;
    font-family: Arial;
    text-align: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.container {
    max-width: 700px;
}

h1 {
    color: #00ffcc;
    font-size: 50px;
    margin-bottom: 10px;
}

h2 {
    font-size: 22px;
    margin-bottom: 30px;
}

button {
    display: block;
    width: 260px;
    margin: 10px auto;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.opt1 { background: #ff4d6d; color: white; }
.opt2 { background: #00cc88; color: white; }
.opt3 { background: #ffd166; color: black; }
.opt4 { background: #6c63ff; color: white; }

#result {
    margin-top: 20px;
    font-size: 18px;
    opacity: 0;
    transition: 0.5s;
}
</style>
</head>

<body>

<div class="container">
    <h1>YAY! 🎉</h1>

    <h2>Ce ai vrea să-ți gătesc Purrito? 🍳</h2>

    <button class="opt1" onclick="choose('Ovăz proteic 🥣')">Ovăz proteic</button>
    <button class="opt2" onclick="choose('Clătite proteice 🥞')">Clătite proteice</button>
    <button class="opt3" onclick="choose('Pui cu legume 🍗')">Pui cu legume</button>
    <button class="opt4" onclick="choose('Paste cu vită 🍝')">Paste cu vită</button>

    <div id="result"></div>
</div>

<script>
function choose(text) {
    const result = document.getElementById("result");
    result.style.opacity = 1;
    result.innerHTML = "Ai ales: <b>" + text + "</b> 😏<br>Gătesc cu drag ❤️";
}
</script>

</body>
</html>
