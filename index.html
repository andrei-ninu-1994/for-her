<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Pentru tine ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #000);
    color: white;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    overflow: hidden;
}

.container {
    max-width: 700px;
    padding: 20px;
    z-index: 2;
}

button {
    padding: 12px 25px;
    margin-top: 20px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.continue {
    background: #444;
    color: white;
    display: none;
}

.yes { background: #00cc88; color: white; }
.no { background: #ff4d4d; color: white; position: relative; }

#text {
    white-space: pre-line;
}

/* ❤️ inimioare */
.heart {
    position: absolute;
    color: rgba(255, 80, 120, 0.7);
    font-size: 20px;
    animation: fall linear infinite;
    top: -50px;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    100% {
        transform: translateY(110vh) scale(1.5);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- ❤️ container -->
<div class="container" id="main">
    <h1>💔</h1>
    <p id="text"></p>
    <button class="continue" id="continueBtn" onclick="nextStep()">Continuă...</button>
</div>

<script>

const message = `Iarta-ma pentru toate zilele cand te-am suparat. Nu asta a fost obiectivul meu, obiectivul meu e sa am grija de tine, sa fiu acolo cand ai nevoie. Chiar imi pasa de tine, stiu ca poate uneori actiunile mele demonstreaza contrariul.

Te iubesc mult si uneori gresesc, dar asta nu inseamna ca nu tin la tine foarte mult, sau ca nu te-as vrea forever. Ai vazut cat de bine ne simtim cand suntem impreuna. De ce n-am vrea sa incercam si sa dam cu piciorul la ceva ce poate nu mai gasim niciunul?

Promit sa fiu langa tine oricand vei avea nevoie. Doar vreau sa comunici cu mine. Nu esti singura in asta, nu trebuie sa fii, eu vreau sa iti fiu alaturi.

I really do... ❤️`;

let i = 0;
const speed = 35;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    } else {
        document.getElementById("continueBtn").style.display = "inline-block";
    }
}

typeWriter();

function nextStep() {
    document.getElementById("main").innerHTML = `
        <h2>Vrei să ne vedem? 🥹</h2>
        <button class="yes" onclick="yesClicked()">DA ❤️</button>
        <button class="no" onmouseover="moveButton(this)">NU 😅</button>
    `;
}

function yesClicked() {
    window.location.href = "yay.html";
}

function moveButton(btn) {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

/* ❤️ inimioare animate */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 5 + 5) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 10000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
